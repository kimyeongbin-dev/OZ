<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- GET -->
    <form action="https://google.com/search" method="get">
        <input type="search" placeholder="Search..." name="q" autofocus autocomplete="off">
        <button>입력</button>
    </form>
    <!-- POST -->
    <form action="https://httpbin.org/post" method="post">
        <input type="text" placeholder="Username" name="username" autofocus autocomplete="off">
        <button>전송</button>
    </form>
    <!-- 나쁜 UX 챌린지 -->
    <form id="SearchForm" action="https://google.com/search" method="get">
        <input type="search" placeholder="Search..." name="q" autofocus autocomplete="off">
        <button form="PostForm">전송</button>
    </form>
</body>
</html>
